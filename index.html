<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROMT Support</title>
    <!-- Premium Gothic and Techno Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;700&family=JetBrains+Mono:wght@100;300;500&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            background-color: #020202;
            background-image: 
                radial-gradient(at 50% 0%, rgba(139, 92, 246, 0.08) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(239, 68, 68, 0.03) 0px, transparent 40%),
                linear-gradient(rgba(255, 255, 255, 0.003) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.003) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
            font-family: 'Space Grotesk', sans-serif;
            color: #f5f5f5;
            overflow-x: hidden;
        }
        .gothic-header {
            font-family: 'Cinzel', serif;
            letter-spacing: 0.25em;
        }
        .monospace-tech {
            font-family: 'JetBrains Mono', monospace;
        }
        /* Corner decoration elements for cyberpunk gothic frames */
        .corner-frame {
            position: relative;
            border: 1px solid rgba(139, 92, 246, 0.15);
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(12px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .corner-frame::before, .corner-frame::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            border-color: rgba(168, 85, 247, 0.6);
            border-style: solid;
            pointer-events: none;
        }
        .corner-frame::before {
            top: -1px;
            left: -1px;
            border-width: 1px 0 0 1px;
        }
        .corner-frame::after {
            bottom: -1px;
            right: -1px;
            border-width: 0 1px 1px 0;
        }
        .corner-frame:hover {
            border-color: rgba(168, 85, 247, 0.4);
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.15);
        }
        /* Custom animated scanline */
        .scanline {
            width: 100%;
            height: 100px;
            background: linear-gradient(0deg, rgba(168, 85, 247, 0.02) 0%, transparent 100%);
            position: absolute;
            animation: scan 8s linear infinite;
            pointer-events: none;
            z-index: 1;
        }
        @keyframes scan {
            0% { top: -100px; }
            100% { top: 100%; }
        }
        /* Custom sleek scrollbar */
        ::-webkit-scrollbar {
            width: 3px;
            height: 3px;
        }
        ::-webkit-scrollbar-track {
            background: #020202;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(168, 85, 247, 0.25);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(168, 85, 247, 0.6);
        }
    </style>
</head>
<body class="min-h-screen text-gray-200 selection:bg-purple-950 selection:text-purple-300 relative">
    <div class="scanline"></div>
    <div id="root" class="relative z-10"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            // Operator Security Database
            const operatorRegistry = {
                asya: "Qaswer",
                sasha: "p1tln"
            };

            // Authentication & Security Node States
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [currentUser, setCurrentUser] = useState("");
            const [loginInput, setLoginInput] = useState("");
            const [passwordInput, setPasswordInput] = useState("");
            const [authError, setAuthError] = useState("");
            const [activeTab, setActiveTab] = useState("storage");
            const [systemStatus, setSystemStatus] = useState("Защищено");

            // Global Notification Center (No punctuation)
            const [notification, setNotification] = useState("");
            const triggerNotification = (message) => {
                setNotification(message);
                setTimeout(() => setNotification(""), 3500);
            };

            // Terminal Live Log System
            const [operationLogs, setOperationLogs] = useState([
                { id: 1, time: "09 24 12", event: "Система PROMT Support запущена в штатном режиме" },
                { id: 2, time: "09 24 13", event: "Каналы передачи данных зашифрованы протоколом сквозного обмена" },
                { id: 3, time: "09 24 15", event: "Ожидание авторизации доверенных операторов" }
            ]);

            const registerLog = (eventText) => {
                const now = new Date();
                const timeString = `${String(now.getHours()).padStart(2, '0')} ${String(now.getMinutes()).padStart(2, '0')} ${String(now.getSeconds()).padStart(2, '0')}`;
                const newLog = {
                    id: Date.now(),
                    time: timeString,
                    event: eventText
                };
                setOperationLogs(prev => [newLog, ...prev].slice(0, 30));
            };

            // Database Core Storage State Managers
            const [folders, setFolders] = useState([]);
            const [files, setFiles] = useState([]);
            const [tasks, setTasks] = useState([]);
            const [events, setEvents] = useState([]);
            const [safe, setSafe] = useState([]);

            // Sync Database with LocalMemory Cache on Boot
            useEffect(() => {
                const savedUser = localStorage.getItem("promt_auth_user");
                if (savedUser) {
                    setCurrentUser(savedUser);
                    setIsAuthenticated(true);
                    registerLog(`Сессия оператора ${savedUser} восстановлена из безопасного хранилища`);
                }

                try {
                    const localFolders = localStorage.getItem("promt_folders");
                    const localFiles = localStorage.getItem("promt_files");
                    const localTasks = localStorage.getItem("promt_tasks");
                    const localEvents = localStorage.getItem("promt_events");
                    const localSafe = localStorage.getItem("promt_safe");

                    if (localFolders) setFolders(JSON.parse(localFolders));
                    if (localFiles) setFiles(JSON.parse(localFiles));
                    if (localTasks) setTasks(JSON.parse(localTasks));
                    if (localEvents) setEvents(JSON.parse(localEvents));
                    if (localSafe) setSafe(JSON.parse(localSafe));
                } catch (e) {
                    registerLog("Ошибка при чтении зашифрованной базы данных устройства");
                }
            }, []);

            const saveFolders = (newFolders) => {
                setFolders(newFolders);
                localStorage.setItem("promt_folders", JSON.stringify(newFolders));
            };

            const saveFiles = (newFiles) => {
                setFiles(newFiles);
                localStorage.setItem("promt_files", JSON.stringify(newFiles));
            };

            const saveTasks = (newTasks) => {
                setTasks(newTasks);
                localStorage.setItem("promt_tasks", JSON.stringify(newTasks));
            };

            const saveEvents = (newEvents) => {
                setEvents(newEvents);
                localStorage.setItem("promt_events", JSON.stringify(newEvents));
            };

            const saveSafe = (newSafe) => {
                setSafe(newSafe);
                localStorage.setItem("promt_safe", JSON.stringify(newSafe));
            };

            const handleAuthSubmit = (e) => {
                e.preventDefault();
                setAuthError("");
                const checkLogin = loginInput.trim().toLowerCase();
                if (operatorRegistry[checkLogin] && operatorRegistry[checkLogin] === passwordInput) {
                    setCurrentUser(checkLogin);
                    setIsAuthenticated(true);
                    localStorage.setItem("promt_auth_user", checkLogin);
                    registerLog(`Оператор ${checkLogin} успешно завершил процесс идентификации личности`);
                    triggerNotification("Добро пожаловать в бункер управления");
                } else {
                    setAuthError("Неверный ключ оператора или секретный шифр безопасности");
                    registerLog(`Зафиксирована попытка несанкционированного доступа с именем ${checkLogin}`);
                }
            };

            const terminateSession = () => {
                registerLog(`Оператор ${currentUser} разорвал защищенное соединение`);
                setIsAuthenticated(false);
                setCurrentUser("");
                setLoginInput("");
                setPasswordInput("");
                localStorage.removeItem("promt_auth_user");
                triggerNotification("Сессия полностью закрыта");
            };

            // ------------------------------------------
            // ------------------------------------------
            const [currentFolderId, setCurrentFolderId] = useState(null);
            const [isAddFolderOpen, setIsAddFolderOpen] = useState(false);
            const [newFolderName, setNewFolderName] = useState("");
            const [editingFile, setEditingFile] = useState(null);
            const [editingFileContent, setEditingFileContent] = useState("");
            const [isDragging, setIsDragging] = useState(false);
            const fileInputRef = useRef(null);

            const handleCreateFolder = (e) => {
                e.preventDefault();
                const name = newFolderName.trim();
                if (!name) return;
                const newFolder = {
                    id: "folder_" + Date.now(),
                    name: name,
                    parentId: currentFolderId
                };
                saveFolders([...folders, newFolder]);
                setNewFolderName("");
                setIsAddFolderOpen(false);
                registerLog(`Создан каталог архива ${name}`);
                triggerNotification("Каталог успешно создан");
            };

            const deleteFolderRecursively = (folderId, e) => {
                if (e) e.stopPropagation();
                let foldersToRemove = [folderId];
                let queue = [folderId];
                while (queue.length > 0) {
                    const currentId = queue.shift();
                    const subfolders = folders.filter(f => f.parentId === currentId);
                    subfolders.forEach(sf => {
                        foldersToRemove.push(sf.id);
                        queue.push(sf.id);
                    });
                }
                const updatedFolders = folders.filter(f => !foldersToRemove.includes(f.id));
                const updatedFiles = files.filter(f => !foldersToRemove.includes(f.parentId) && f.parentId !== folderId);
                saveFolders(updatedFolders);
                saveFiles(updatedFiles);
                registerLog(`Удален каталог с идентификатором ${folderId} и все вложенные элементы`);
                triggerNotification("Каталог полностью очищен");
            };

            const handleFileDropUpload = async (fileList) => {
                const newFiles = [...files];
                for (let i = 0; i < fileList.length; i++) {
                    const droppedFile = fileList[i];
                    let textContent = "";
                    if (droppedFile.type.startsWith("text/") || droppedFile.name.endsWith(".txt") || droppedFile.name.endsWith(".md")) {
                        try {
                            textContent = await droppedFile.text();
                        } catch (err) {
                            textContent = "";
                        }
                    }
                    newFiles.push({
                        id: "file_" + Date.now() + "_" + i,
                        name: droppedFile.name,
                        parentId: currentFolderId,
                        size: droppedFile.size > 1048576 
                            ? `${Math.round(droppedFile.size / 1048576)} Мб` 
                            : `${Math.round(droppedFile.size / 1024)} Кб`,
                        type: droppedFile.type || "application/octet-stream",
                        content: textContent
                    });
                    registerLog(`Загружен файл ${droppedFile.name}`);
                }
                saveFiles(newFiles);
                triggerNotification("Файлы импортированы в облако");
            };

            const triggerFolderAndFileExtraction = async (item, parentId) => {
                if (item.isFile) {
                    const fileObj = await new Promise((resolve) => item.file(resolve));
                    let contentText = "";
                    if (fileObj.type.startsWith("text/") || fileObj.name.endsWith(".txt") || fileObj.name.endsWith(".md")) {
                        contentText = await fileObj.text();
                    }
                    const registeredFile = {
                        id: "file_" + Date.now() + "_" + Math.random().toString(36).substr(2, 5),
                        name: item.name,
                        parentId: parentId,
                        size: fileObj.size > 1048576 
                            ? `${Math.round(fileObj.size / 1048576)} Мб` 
                            : `${Math.round(fileObj.size / 1024)} Кб`,
                        type: fileObj.type || "application/octet-stream",
                        content: contentText
                    };
                    const existingRaw = localStorage.getItem("promt_files") || "[]";
                    const existingParsed = JSON.parse(existingRaw);
                    existingParsed.push(registeredFile);
                    localStorage.setItem("promt_files", JSON.stringify(existingParsed));
                    setFiles(existingParsed);
                    registerLog(`Импортирован файл ${item.name} в структуре каталогов`);
                } else if (item.isDirectory) {
                    const subFolderId = "folder_" + Date.now() + "_" + Math.random().toString(36).substr(2, 5);
                    const registeredFolder = {
                        id: subFolderId,
                        name: item.name,
                        parentId: parentId
                    };
                    const existingFoldersRaw = localStorage.getItem("promt_folders") || "[]";
                    const existingFoldersParsed = JSON.parse(existingFoldersRaw);
                    existingFoldersParsed.push(registeredFolder);
                    localStorage.setItem("promt_folders", JSON.stringify(existingFoldersParsed));
                    setFolders(existingFoldersParsed);
                    registerLog(`Импортирован каталог ${item.name}`);

                    const dirReader = item.createReader();
                    const subEntries = await new Promise((resolve) => dirReader.readEntries(resolve));
                    for (const sub of subEntries) {
                        await triggerFolderAndFileExtraction(sub, subFolderId);
                    }
                }
            };

            const handleDragOverArea = (e) => {
                e.preventDefault();
                setIsDragging(true);
            };

            const handleDragLeaveArea = () => {
                setIsDragging(false);
            };

            const handleDropArea = async (e) => {
                e.preventDefault();
                setIsDragging(false);
                const items = e.dataTransfer.items;
                if (!items) return;
                for (let i = 0; i < items.length; i++) {
                    const item = items[i];
                    if (item.kind === "file") {
                        const entry = item.webkitGetAsEntry();
                        if (entry) {
                            await triggerFolderAndFileExtraction(entry, currentFolderId);
                        }
                    }
                }
                triggerNotification("Структуры каталогов импортированы");
            };

            const deleteIndividualFile = (fileId, name, e) => {
                if (e) e.stopPropagation();
                const filtered = files.filter(f => f.id !== fileId);
                saveFiles(filtered);
                registerLog(`Исключен файл ${name} из реестра данных`);
                triggerNotification("Файл удален");
            };

            const handleSaveEditedContent = () => {
                if (!editingFile) return;
                const updated = files.map(f => f.id === editingFile.id ? { ...f, content: editingFileContent } : f);
                saveFiles(updated);
                setEditingFile(null);
                setEditingFileContent("");
                registerLog(`Сохранены внесенные правки в текстовый файл ${editingFile.name}`);
                triggerNotification("Изменения внесены успешно");
            };

            const getBreadcrumbs = () => {
                const list = [];
                let trackingId = currentFolderId;
                while (trackingId) {
                    const match = folders.find(f => f.id === trackingId);
                    if (match) {
                        list.unshift(match);
                        trackingId = match.parentId;
                    } else {
                        break;
                    }
                }
                return list;
            };

            // ------------------------------------------
            // ------------------------------------------
            const [isAddTaskOpen, setIsAddTaskOpen] = useState(false);
            const [taskTitle, setTaskTitle] = useState("");
            const [taskDesc, setTaskDesc] = useState("");
            const [taskAssignee, setTaskAssignee] = useState("asya");
            const [taskDeadline, setTaskDeadline] = useState("");

            const handleCreateTaskSubmit = (e) => {
                e.preventDefault();
                const title = taskTitle.trim();
                if (!title) return;
                const newTask = {
                    id: "task_" + Date.now(),
                    title: title,
                    description: taskDesc.trim(),
                    status: "todo",
                    assignee: taskAssignee,
                    deadline: taskDeadline.trim() || "Срочно"
                };
                saveTasks([...tasks, newTask]);
                setTaskTitle("");
                setTaskDesc("");
                setTaskAssignee("asya");
                setTaskDeadline("");
                setIsAddTaskOpen(false);
                registerLog(`Зарегистрирована рабочая задача ${title}`);
                triggerNotification("Задача размещена на доске");
            };

            const changeTaskStatus = (taskId, nextStatus) => {
                const updated = tasks.map(t => t.id === taskId ? { ...t, status: nextStatus } : t);
                saveTasks(updated);
                registerLog(`Статус рабочей задачи ${taskId} изменен на ${nextStatus}`);
                triggerNotification("Статус задачи обновлен");
            };

            const removeTaskFromLedger = (taskId) => {
                const updated = tasks.filter(t => t.id !== taskId);
                saveTasks(updated);
                registerLog(`Рабочая задача ${taskId} удалена оператором`);
                triggerNotification("Задача стерта из реестра");
            };

            // ------------------------------------------
            // ------------------------------------------
            const [calendarYear, setCalendarYear] = useState(2026);
            const [calendarMonth, setCalendarMonth] = useState(4); // May
            const [selectedCalendarDay, setSelectedCalendarDay] = useState(23);
            const [isAddEventOpen, setIsAddEventOpen] = useState(false);
            const [eventTitle, setEventTitle] = useState("");
            const [eventTime, setEventTime] = useState("");

            const daysCount = new Date(calendarYear, calendarMonth + 1, 0).getDate();
            const firstDayIndex = new Date(calendarYear, calendarMonth, 1).getDay();
            const paddedStartIndex = firstDayIndex === 0 ? 6 : firstDayIndex - 1;

            const months = [
                "Январь", "Февраль", "Март", "Апрель", "Май", "Июнь",
                "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"
            ];
            const weekdays = ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"];

            const navigateMonth = (direction) => {
                if (direction === "prev") {
                    if (calendarMonth === 0) {
                        setCalendarMonth(11);
                        setCalendarYear(prev => prev - 1);
                    } else {
                        setCalendarMonth(prev => prev - 1);
                    }
                } else {
                    if (calendarMonth === 11) {
                        setCalendarMonth(0);
                        setCalendarYear(prev => prev + 1);
                    } else {
                        setCalendarMonth(prev => prev + 1);
                    }
                }
            };

            const handleCreateCalendarEvent = (e) => {
                e.preventDefault();
                const title = eventTitle.trim();
                if (!title) return;
                const dateKey = `${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}-${String(selectedCalendarDay).padStart(2, '0')}`;
                const newEv = {
                    id: "event_" + Date.now(),
                    title: title,
                    time: eventTime.trim() || "12 00",
                    date: dateKey
                };
                saveEvents([...events, newEv]);
                setEventTitle("");
                setEventTime("");
                setIsAddEventOpen(false);
                registerLog(`В план занесено событие ${title} на дату ${dateKey}`);
                triggerNotification("Событие внесено в расписание");
            };

            const removeCalendarEvent = (evId) => {
                const updated = events.filter(e => e.id !== evId);
                saveEvents(updated);
                registerLog(`Событие ${evId} удалено из календаря`);
                triggerNotification("Событие отменено");
            };

            const checkDayHasActiveEvents = (day) => {
                const dateKey = `${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                return events.some(e => e.date === dateKey);
            };

            const getEventsForSelectedDay = () => {
                const dateKey = `${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}-${String(selectedCalendarDay).padStart(2, '0')}`;
                return events.filter(e => e.date === dateKey);
            };

            // ------------------------------------------
            // ------------------------------------------
            const [metricUrl, setMetricUrl] = useState("");
            const [metricToken, setMetricToken] = useState("");
            const [metricsLoading, setMetricsLoading] = useState(false);
            const [activeMetrics, setActiveMetrics] = useState(null);

            const handleFetchLiveMetrics = async (e) => {
                e.preventDefault();
                if (!metricUrl || !metricToken) {
                    triggerNotification("Укажите адрес вебсайта и ваш рабочий токен доступа");
                    return;
                }
                setMetricsLoading(true);
                setActiveMetrics(null);
                registerLog("Запущен процесс удаленного обмена данными с серверами Google Analytics");

                const retrieveWithRetry = async (url, payload, retryCount = 3, interval = 1500) => {
                    try {
                        const response = await fetch(url, payload);
                        if (!response.ok) throw new Error("Статус соединения " + response.status);
                        return await response.json();
                    } catch (err) {
                        if (retryCount > 0) {
                            await new Promise(res => setTimeout(res, interval));
                            return retrieveWithRetry(url, payload, retryCount - 1, interval * 2);
                        }
                        throw err;
                    }
                };

                try {
                    const cleanUrl = metricUrl.trim();
                    const liveGscUrl = `https://www.googleapis.com/webmasters/v3/sites/${encodeURIComponent(cleanUrl)}/searchAnalytics/query`;
                    const searchBody = {
                        startDate: "2026-04-01",
                        endDate: "2026-05-20",
                        dimensions: ["query"],
                        rowLimit: 10
                    };

                    const result = await retrieveWithRetry(liveGscUrl, {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${metricToken.trim()}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(searchBody)
                    });

                    if (result && result.rows) {
                        const formatted = result.rows.map(row => ({
                            query: row.keys[0],
                            clicks: row.clicks || 0,
                            impressions: row.impressions || 0,
                            ctr: Math.round((row.ctr || 0) * 100),
                            position: Math.round(row.position || 0)
                        }));
                        setActiveMetrics(formatted);
                        registerLog(`Успешно импортировано ${formatted.length} рабочих поисковых запросов`);
                        triggerNotification("Аналитические данные обновлены");
                    } else {
                        triggerNotification("Сервер вернул пустой набор данных");
                        registerLog("Запрос к Google Console выполнен успешно но записи отсутствуют");
                    }
                } catch (err) {
                    registerLog("Сбой установления зашифрованного соединения с Google REST API");
                    triggerNotification("Ошибка авторизации токена");
                } finally {
                    setMetricsLoading(false);
                }
            };

            // ------------------------------------------
            // ------------------------------------------
            const [isAddSafeOpen, setIsAddSafeOpen] = useState(false);
            const [safeService, setSafeService] = useState("");
            const [safeLogin, setSafeLogin] = useState("");
            const [safePass, setSafePass] = useState("");
            const [safeNote, setSafeNote] = useState("");
            const [revealedPasswords, setRevealedPasswords] = useState({});

            const handleCreateSafeEntrySubmit = (e) => {
                e.preventDefault();
                const service = safeService.trim();
                if (!service) return;
                const newRecord = {
                    id: "safe_" + Date.now(),
                    service: service,
                    login: safeLogin.trim(),
                    password: safePass,
                    note: safeNote.trim()
                };
                saveSafe([...safe, newRecord]);
                setSafeService("");
                setSafeLogin("");
                setSafePass("");
                setSafeNote("");
                setIsAddSafeOpen(false);
                registerLog(`В криптографический сейф внесена запись ${service}`);
                triggerNotification("Учетная запись запечатана");
            };

            const toggleRevealPasswordStatus = (id) => {
                setRevealedPasswords(prev => ({ ...prev, [id]: !prev[id] }));
                registerLog(`Запрошено раскрытие пароля для записи ${id}`);
            };

            const triggerPasswordClipboardCopy = (secretText) => {
                const tempField = document.createElement("textarea");
                tempField.value = secretText;
                document.body.appendChild(tempField);
                tempField.select();
                document.execCommand("copy");
                document.body.removeChild(tempField);
                triggerNotification("Секретный код скопирован");
                registerLog("Пароль скопирован в буфер обмена устройства");
            };

            const removeSafeEntry = (itemId) => {
                const filtered = safe.filter(i => i.id !== itemId);
                saveSafe(filtered);

                                                value={taskAssignee}
                                                onChange={(e) => setTaskAssignee(e.target.value)}
                                                class="w-full bg-black border border-zinc-800 focus:border-purple-500 text-white rounded-xl py-2 px-3 outline-none transition-all text-xs tracking-wider uppercase font-bold monospace-tech"
                                            >
                                                <option value="asya">asya</option>
                                                <option value="sasha">sasha</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label class="block text-[10px] uppercase tracking-widest text-purple-300/80 mb-1.5 monospace-tech">
                                                Срок
                                            </label>
                                            <input 
                                                type="text" 
                                                placeholder="23 мая"
                                                value={taskDeadline}
                                                onChange={(e) => setTaskDeadline(e.target.value)}
                                                class="w-full bg-black border border-zinc-800 focus:border-purple-500 text-white rounded-xl py-2 px-4 outline-none transition-all text-xs tracking-wider monospace-tech"
                                            />
                                        </div>
                                    </div>

                                    <div class="flex items-center justify-end gap-3 pt-3 border-t border-zinc-900">
                                        <button 
                                            type="button" 
                                            onClick={() => {
                                                setIsAddTaskOpen(false);
                                                setTaskTitle("");
                                                setTaskDesc("");
                                            }}
                                            class="py-2 px-4 bg-zinc-900 border border-zinc-800 hover:border-zinc-700 rounded-xl text-[10px] uppercase tracking-widest font-bold text-gray-400 hover:text-white transition-all monospace-tech"
                                        >
                                            Отмена
                                        </button>
                                        <button 
                                            type="submit" 
                                            class="py-2 px-4 bg-purple-950/40 border border-purple-500/50 hover:border-purple-400 rounded-xl text-[10px] uppercase tracking-widest font-bold text-purple-300 transition-all monospace-tech"
                                        >
                                            Добавить
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Add Event Modal */}
                    {isAddEventOpen && (
                        <div class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div class="bg-zinc-950 border border-purple-500/30 p-6 rounded-3xl w-full max-w-sm gothic-glow space-y-5 relative">
                                <span class="text-xs font-black tracking-widest text-purple-400 uppercase block pb-2 border-b border-zinc-900 monospace-tech">
                                    Новое событие
                                </span>
                                <form onSubmit={handleCreateCalendarEvent} class="space-y-4">
                                    <div>
                                        <label class="block text-[10px] uppercase tracking-widest text-purple-300/80 mb-1.5 monospace-tech">
                                            Название события
                                        </label>
                                        <input 
                                            type="text" 
                                            value={eventTitle}
                                            onChange={(e) => setEventTitle(e.target.value)}
                                            required
                                            class="w-full bg-black border border-zinc-800 focus:border-purple-500 text-white rounded-xl py-2 px-4 outline-none transition-all text-xs tracking-wider monospace-tech"
                                        />
                                    </div>

                                    <div>
                                        <label class="block text-[10px] uppercase tracking-widest text-purple-300/80 mb-1.5 monospace-tech">
                                            Время созвона
                                        </label>
                                        <input 
                                            type="text" 
                                            placeholder="14 00"
                                            value={eventTime}
                                            onChange={(e) => setEventTime(e.target.value)}
                                            class="w-full bg-black border border-zinc-800 focus:border-purple-500 text-white rounded-xl py-2 px-4 outline-none transition-all text-xs tracking-wider monospace-tech"
                                        />
                                    </div>

                                    <div class="flex items-center justify-end gap-3 pt-3 border-t border-zinc-900">
                                        <button 
                                            type="button" 
                                            onClick={() => {
                                                setIsAddEventOpen(false);
                                                setEventTitle("");
                                                setEventTime("");
                                            }}
                                            class="py-2 px-4 bg-zinc-900 border border-zinc-800 hover:border-zinc-700 rounded-xl text-[10px] uppercase tracking-widest font-bold text-gray-400 hover:text-white transition-all monospace-tech"
                                        >
                                            Отмена
                                        </button>
                                        <button 
                                            type="submit" 
                                            class="py-2 px-4 bg-purple-950/40 border border-purple-500/50 hover:border-purple-400 rounded-xl text-[10px] uppercase tracking-widest font-bold text-purple-300 transition-all monospace-tech"
                                        >
                                            Добавить
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Add Safe Entry Modal */}
                    {isAddSafeOpen && (
                        <div class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div class="bg-zinc-950 border border-purple-500/30 p-6 rounded-3xl w-full max-w-sm gothic-glow space-y-4 relative">
                                <span class="text-xs font-black tracking-widest text-purple-400 uppercase block pb-2 border-b border-zinc-900 monospace-tech">
                                    Добавить запись в сейф
                                </span>
                                <form onSubmit={handleCreateSafeEntrySubmit} class="space-y-3">
                                    <div>
                                        <label class="block text-[10px] uppercase tracking-widest text-purple-300/80 mb-1 monospace-tech">
                                            Название сервиса
                                        </label>
                                        <input 
                                            type="text" 
                                            value={safeService}
                                            onChange={(e) => setSafeService(e.target.value)}
                                            required
                                            class="w-full bg-black border border-zinc-800 focus:border-purple-500 text-white rounded-xl py-2.5 px-4 outline-none transition-all text-xs tracking-wider monospace-tech"
                                        />
                                    </div>

                                    <div>
                                        <label class="block text-[10px] uppercase tracking-widest text-purple-300/80 mb-1 monospace-tech">
                                            Идентификатор логин
                                        </label>
                                        <input 
                                            type="text" 
                                            value={safeLogin}
                                            onChange={(e) => setSafeLogin(e.target.value)}
                                            required
                                            class="w-full bg-black border border-zinc-800 focus:border-purple-500 text-white rounded-xl py-2.5 px-4 outline-none transition-all text-xs tracking-wider monospace-tech"
                                        />
                                    </div>

                                    <div>
                                        <label class="block text-[10px] uppercase tracking-widest text-purple-300/80 mb-1 monospace-tech">
                                            Секретный пароль
                                        </label>
                                        <input 
                                            type="text" 
                                            value={safePass}
                                            onChange={(e) => setSafePass(e.target.value)}
                                            required
                                            class="w-full bg-black border border-zinc-800 focus:border-purple-500 text-white rounded-xl py-2.5 px-4 outline-none transition-all text-xs tracking-wider monospace-tech"
                                        />
                                    </div>

                                    <div>
                                        <label class="block text-[10px] uppercase tracking-widest text-purple-300/80 mb-1 monospace-tech">
                                            Примечания к ключу
                                        </label>
                                        <input 
                                            type="text" 
                                            value={safeNote}
                                            onChange={(e) => setSafeNote(e.target.value)}
                                            class="w-full bg-black border border-zinc-800 focus:border-purple-500 text-white rounded-xl py-2.5 px-4 outline-none transition-all text-xs tracking-wider monospace-tech"
                                        />
                                    </div>

                                    <div class="flex items-center justify-end gap-3 pt-3 border-t border-zinc-900">
                                        <button 
                                            type="button" 
                                            onClick={() => {
                                                setIsAddSafeOpen(false);
                                                setSafeService("");
                                                setSafeLogin("");
                                                setSafePass("");
                                                setSafeNote("");
                                            }}
                                            class="py-2 px-4 bg-zinc-900 border border-zinc-800 hover:border-zinc-700 rounded-xl text-[10px] uppercase tracking-widest font-bold text-gray-400 hover:text-white transition-all monospace-tech"
                                        >
                                            Отмена
                                        </button>
                                        <button 
                                            type="submit" 
                                            class="py-2 px-4 bg-purple-950/40 border border-purple-500/50 hover:border-purple-400 rounded-xl text-[10px] uppercase tracking-widest font-bold text-purple-300 transition-all monospace-tech"
                                        >
                                            Запечатать
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
