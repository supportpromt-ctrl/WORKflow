<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROMT Support</title>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            background-color: #030303;
            background-image: 
                radial-gradient(at 50% 50%, rgba(88, 28, 135, 0.12) 0px, transparent 50%),
                radial-gradient(at 0% 0%, rgba(220, 38, 38, 0.05) 0px, transparent 50%),
                linear-gradient(rgba(255, 255, 255, 0.005) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.005) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 30px 30px, 30px 30px;
            font-family: 'Space Grotesk', sans-serif;
            color: #ffffff;
            overflow-x: hidden;
        }
        .gothic-header {
            font-family: 'Cinzel', serif;
        }
        /* Custom Premium Lavender/Crimson Glowing Borders */
        .gothic-glow {
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .gothic-glow:hover {
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.3);
            border: 1px solid rgba(168, 85, 247, 0.6);
        }
        .gothic-glow-crimson {
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .gothic-glow-crimson:hover {
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.3);
            border: 1px solid rgba(239, 68, 68, 0.6);
        }
        /* Custom scrollbar for noir ecosystem */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #050505;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(168, 85, 247, 0.3);
            border-radius: 2px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(168, 85, 247, 0.6);
        }
    </style>
</head>
<body class="min-h-screen text-gray-100 selection:bg-purple-900 selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            // Operator Accounts
            const users = {
                asya: "Qaswer",
                sasha: "p1tln"
            };

            // Authentication state
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [currentUser, setCurrentUser] = useState("");
            const [loginInput, setLoginInput] = useState("");
            const [passwordInput, setPasswordInput] = useState("");
            const [authError, setAuthError] = useState("");

            // Active Tab State
            const [activeTab, setActiveTab] = useState("storage");

            // Global Notification Banner (Strict zero punctuation strings)
            const [notification, setNotification] = useState("");
            const showNotification = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(""), 4000);
            };

            // ------------------------------------------
            // CORE STATE MANAGERS (LocalStorage Backup & Sync)
            // ------------------------------------------
            const [folders, setFolders] = useState([]);
            const [files, setFiles] = useState([]);
            const [tasks, setTasks] = useState([]);
            const [events, setEvents] = useState([]);
            const [safe, setSafe] = useState([]);

            // Load saved data on mount
            useEffect(() => {
                const storedUser = localStorage.getItem("promt_auth_user");
                if (storedUser) {
                    setCurrentUser(storedUser);
                    setIsAuthenticated(true);
                }

                try {
                    const localFolders = localStorage.getItem("promt_folders");
                    const localFiles = localStorage.getItem("promt_files");
                    const localTasks = localStorage.getItem("promt_tasks");
                    const localEvents = localStorage.getItem("promt_events");
                    const localSafe = localStorage.getItem("promt_safe");

                    if (localFolders) setFolders(JSON.parse(localFolders));
                    if (localFiles) setFiles(JSON.parse(localFiles));
                    if (localTasks) setTasks(JSON.parse(localTasks));
                    if (localEvents) setEvents(JSON.parse(localEvents));
                    if (localSafe) setSafe(JSON.parse(localSafe));
                } catch (e) {
                    showNotification("Ошибка чтения сохраненной конфигурации");
                }
            }, []);

            // Helper State updaters with persistence
            const updateFolders = (newFolders) => {
                setFolders(newFolders);
                localStorage.setItem("promt_folders", JSON.stringify(newFolders));
            };

            const updateFiles = (newFiles) => {
                setFiles(newFiles);
                localStorage.setItem("promt_files", JSON.stringify(newFiles));
            };

            const updateTasks = (newTasks) => {
                setTasks(newTasks);
                localStorage.setItem("promt_tasks", JSON.stringify(newTasks));
            };

            const updateEvents = (newEvents) => {
                setEvents(newEvents);
                localStorage.setItem("promt_events", JSON.stringify(newEvents));
            };

            const updateSafe = (newSafe) => {
                setSafe(newSafe);
                localStorage.setItem("promt_safe", JSON.stringify(newSafe));
            };

            // Auth Logic
            const handleLogin = (e) => {
                e.preventDefault();
                setAuthError("");
                const trimmedLogin = loginInput.trim();
                if (users[trimmedLogin] && users[trimmedLogin] === passwordInput) {
                    setCurrentUser(trimmedLogin);
                    setIsAuthenticated(true);
                    localStorage.setItem("promt_auth_user", trimmedLogin);
                    showNotification("Соединение успешно установлено");
                } else {
                    setAuthError("Неверное имя или пароль доступа попробуйте еще раз");
                }
            };

            const handleLogout = () => {
                setIsAuthenticated(false);
                setCurrentUser("");
                localStorage.removeItem("promt_auth_user");
                showNotification("Сессия завершена система заблокирована");
            };

            // ------------------------------------------
            // STORAGE MODULE VARIABLES & LOGIC
            // ------------------------------------------
            const [currentFolderId, setCurrentFolderId] = useState(null);
            const [isAddFolderOpen, setIsAddFolderOpen] = useState(false);
            const [newFolderName, setNewFolderName] = useState("");
            const [editingFile, setEditingFile] = useState(null);
            const [editingFileContent, setEditingFileContent] = useState("");
            const [isDragging, setIsDragging] = useState(false);
            const fileInputRef = useRef(null);

            // Create new directory
            const handleCreateFolder = (e) => {
                e.preventDefault();
                const trimmed = newFolderName.trim();
                if (!trimmed) return;
                const newFolder = {
                    id: "folder_" + Date.now() + "_" + Math.random().toString(36).substr(2, 5),
                    name: trimmed,
                    parentId: currentFolderId
                };
                updateFolders([...folders, newFolder]);
                setNewFolderName("");
                setIsAddFolderOpen(false);
                showNotification("Папка успешно добавлена");
            };

            // Delete folder and all its hierarchical content
            const handleDeleteFolder = (folderId, e) => {
                if (e) e.stopPropagation();
                let foldersToRemove = [folderId];
                let queue = [folderId];
                
                while (queue.length > 0) {
                    const currentId = queue.shift();
                    const subfolders = folders.filter(f => f.parentId === currentId);
                    subfolders.forEach(sf => {
                        foldersToRemove.push(sf.id);
                        queue.push(sf.id);
                    });
                }

                const remainingFolders = folders.filter(f => !foldersToRemove.includes(f.id));
                const remainingFiles = files.filter(f => !foldersToRemove.includes(f.parentId) && f.parentId !== folderId);
                
                updateFolders(remainingFolders);
                updateFiles(remainingFiles);
                showNotification("Папка и все вложенные элементы удалены");
            };

            // Delete file
            const handleDeleteFile = (fileId, e) => {
                if (e) e.stopPropagation();
                const remainingFiles = files.filter(f => f.id !== fileId);
                updateFiles(remainingFiles);
                showNotification("Файл удален");
            };

            // File Upload / Drop processing
            const processFileSelection = async (fileList, parentFolderId) => {
                const newFiles = [...files];
                for (let i = 0; i < fileList.length; i++) {
                    const originalFile = fileList[i];
                    let textContent = "";
                    if (originalFile.type.startsWith("text/") || originalFile.name.endsWith(".txt") || originalFile.name.endsWith(".md")) {
                        try {
                            textContent = await originalFile.text();
                        } catch (err) {
                            textContent = "";
                        }
                    }
                    newFiles.push({
                        id: "file_" + Date.now() + "_" + Math.random().toString(36).substr(2, 5),
                        name: originalFile.name,
                        parentId: parentFolderId,
                        size: originalFile.size > 1048576 
                            ? `${Math.round(originalFile.size / 1048576)} Мб` 
                            : `${Math.round(originalFile.size / 1024)} Кб`,
                        type: originalFile.type || "application/octet-stream",
                        content: textContent
                    });
                }
                updateFiles(newFiles);
                showNotification("Загрузка файлов успешно завершена");
            };

            // Traversing dropped file/directory entries recursively
            const traverseEntry = async (entry, parentFolderId) => {
                if (entry.isFile) {
                    const fileObj = await new Promise((resolve) => entry.file(resolve));
                    let contentText = "";
                    if (fileObj.type.startsWith("text/") || fileObj.name.endsWith(".txt") || fileObj.name.endsWith(".md")) {
                        contentText = await fileObj.text();
                    }
                    const registeredFile = {
                        id: "file_" + Date.now() + "_" + Math.random().toString(36).substr(2, 5),
                        name: entry.name,
                        parentId: parentFolderId,
                        size: fileObj.size > 1048576 
                            ? `${Math.round(fileObj.size / 1048576)} Мб` 
                            : `${Math.round(fileObj.size / 1024)} Кб`,
                        type: fileObj.type || "application/octet-stream",
                        content: contentText
                    };
                    // Read updated files array from localStorage directly to preserve state in loop
                    const existingRaw = localStorage.getItem("promt_files") || "[]";
                    const existingParsed = JSON.parse(existingRaw);
                    existingParsed.push(registeredFile);
                    localStorage.setItem("promt_files", JSON.stringify(existingParsed));
                    setFiles(existingParsed);
                } else if (entry.isDirectory) {
                    const createdFolderId = "folder_" + Date.now() + "_" + Math.random().toString(36).substr(2, 5);
                    const registeredFolder = {
                        id: createdFolderId,
                        name: entry.name,
                        parentId: parentFolderId
                    };
                    const existingFoldersRaw = localStorage.getItem("promt_folders") || "[]";
                    const existingFoldersParsed = JSON.parse(existingFoldersRaw);
                    existingFoldersParsed.push(registeredFolder);
                    localStorage.setItem("promt_folders", JSON.stringify(existingFoldersParsed));
                    setFolders(existingFoldersParsed);

                    const dirReader = entry.createReader();
                    const subEntries = await new Promise((resolve) => dirReader.readEntries(resolve));
                    for (const sub of subEntries) {
                        await traverseEntry(sub, createdFolderId);
                    }
                }
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                setIsDragging(true);
            };

            const handleDragLeave = () => {
                setIsDragging(false);
            };

            const handleDrop = async (e) => {
                e.preventDefault();
                setIsDragging(false);
                const items = e.dataTransfer.items;
                if (!items) return;

                for (let i = 0; i < items.length; i++) {
                    const item = items[i];
                    if (item.kind === "file") {
                        const entry = item.webkitGetAsEntry();
                        if (entry) {
                            await traverseEntry(entry, currentFolderId);
                        }
                    }
                }
                showNotification("Папки и файлы импортированы");
            };

            const handleFileSelect = (e) => {
                if (e.target.files && e.target.files.length > 0) {
                    processFileSelection(e.target.files, currentFolderId);
                }
            };

            // Saving current text file changes inside premium editor
            const handleSaveEditedFile = () => {
                if (!editingFile) return;
                const updatedFiles = files.map(f => f.id === editingFile.id ? { ...f, content: editingFileContent } : f);
                updateFiles(updatedFiles);
                setEditingFile(null);
                setEditingFileContent("");
                showNotification("Изменения файла сохранены");
            };

            // Find current navigation hierarchy breadcrumbs
            const getFolderBreadcrumbs = () => {
                const crumbs = [];
                let stepId = currentFolderId;
                while (stepId) {
                    const found = folders.find(f => f.id === stepId);
                    if (found) {
                        crumbs.unshift(found);
                        stepId = found.parentId;
                    } else {
                        break;
                    }
                }
                return crumbs;
            };

            // ------------------------------------------
            // TASK BOARD MODULE VARIABLES & LOGIC
            // ------------------------------------------
            const [isAddTaskOpen, setIsAddTaskOpen] = useState(false);
            const [taskTitle, setTaskTitle] = useState("");
            const [taskDesc, setTaskDesc] = useState("");
            const [taskAssignee, setTaskAssignee] = useState("asya");
            const [taskDeadline, setTaskDeadline] = useState("");

            const handleCreateTask = (e) => {
                e.preventDefault();
                const trimmedTitle = taskTitle.trim();
                if (!trimmedTitle) return;
                const newTask = {
                    id: "task_" + Date.now(),
                    title: trimmedTitle,
                    description: taskDesc.trim(),
                    status: "todo",
                    assignee: taskAssignee,
                    deadline: taskDeadline
                };
                updateTasks([...tasks, newTask]);
                setTaskTitle("");
                setTaskDesc("");
                setTaskAssignee("asya");
                setTaskDeadline("");
                setIsAddTaskOpen(false);
                showNotification("Задача создана успешно");
            };

            const moveTaskStatus = (taskId, newStatus) => {
                const updated = tasks.map(t => t.id === taskId ? { ...t, status: newStatus } : t);
                updateTasks(updated);
                showNotification("Статус задачи изменен");
            };

            const handleDeleteTask = (taskId) => {
                const updated = tasks.filter(t => t.id !== taskId);
                updateTasks(updated);
                showNotification("Задача безвозвратно удалена");
            };

            // ------------------------------------------
            // CHRONOS CALENDAR MODULE VARIABLES & LOGIC
            // ------------------------------------------
            const [currentYear, setCurrentYear] = useState(2026);
            const [currentMonth, setCurrentMonth] = useState(4); // May
            const [selectedDay, setSelectedDay] = useState(23);
            const [isAddEventOpen, setIsAddEventOpen] = useState(false);
            const [eventTitle, setEventTitle] = useState("");
            const [eventTime, setEventTime] = useState("");

            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const startDayIndex = new Date(currentYear, currentMonth, 1).getDay();
            // Match Mon (0) to Sun (6)
            const adjustedStartIndex = startDayIndex === 0 ? 6 : startDayIndex - 1;

            const monthsList = [
                "Январь", "Февраль", "Март", "Апрель", "Май", "Июнь",
                "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"
            ];

            const weekDays = ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"];

            const changeMonth = (direction) => {
                if (direction === "prev") {
                    if (currentMonth === 0) {
                        setCurrentMonth(11);
                        setCurrentYear(currentYear - 1);
                    } else {
                        setCurrentMonth(currentMonth - 1);
                    }
                } else {
                    if (currentMonth === 11) {
                        setCurrentMonth(0);
                        setCurrentYear(currentYear + 1);
                    } else {
                        setCurrentMonth(currentMonth + 1);
                    }
                }
            };

            const handleCreateEvent = (e) => {
                e.preventDefault();
                const trimmedTitle = eventTitle.trim();
                if (!trimmedTitle) return;
                const formattedDateString = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(selectedDay).padStart(2, '0')}`;
                const newEvent = {
                    id: "event_" + Date.now(),
                    title: trimmedTitle,
                    time: eventTime.trim() || "12 00",
                    date: formattedDateString
                };
                updateEvents([...events, newEvent]);
                setEventTitle("");
                setEventTime("");
                setIsAddEventOpen(false);
                showNotification("Событие добавлено в план");
            };

            const handleDeleteEvent = (eventId) => {
                const updated = events.filter(e => e.id !== eventId);
                updateEvents(updated);
                showNotification("Событие удалено из календаря");
            };

            // Check if day has events
            const dayHasEvents = (day) => {
                const checkString = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                return events.some(e => e.date === checkString);
            };

            // Filter events for the currently selected day
            const getEventsForSelectedDay = () => {
                const checkString = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(selectedDay).padStart(2, '0')}`;
                return events.filter(e => e.date === checkString);
            };

            // ------------------------------------------
            // METRICS MODULE VARIABLES & LOGIC
            // ------------------------------------------
            const [gscSiteUrl, setGscSiteUrl] = useState("");
            const [gscAccessToken, setGscAccessToken] = useState("");
            const [isLoadingMetrics, setIsLoadingMetrics] = useState(false);
            const [metricsData, setMetricsData] = useState(null);

            // Fetch live metrics from real Google Search Console REST API
            const handleFetchGscMetrics = async (e) => {
                e.preventDefault();
                if (!gscSiteUrl || !gscAccessToken) {
                    showNotification("Укажите адрес сайта и ваш действительный токен");
                    return;
                }
                setIsLoadingMetrics(true);
                setMetricsData(null);

                // Backoff retry wrapper
                const fetchWithRetry = async (url, options, retries = 5, delay = 1000) => {
                    try {
                        const res = await fetch(url, options);
                        if (!res.ok) throw new Error("Статус ошибки " + res.status);
                        return await res.json();
                    } catch (error) {
                        if (retries > 0) {
                            await new Promise(r => setTimeout(r, delay));
                            return fetchWithRetry(url, options, retries - 1, delay * 2);
                        }
                        throw error;
                    }
                };

                try {
                    const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=`;
                    // Calling real GSC endpoint directly via standard HTTP fetch with auth token
                    const gscEndpoint = `https://www.googleapis.com/webmasters/v3/sites/${encodeURIComponent(gscSiteUrl)}/searchAnalytics/query`;
                    const gscBody = {
                        startDate: "2026-04-01",
                        endDate: "2026-05-20",
                        dimensions: ["query"],
                        rowLimit: 8
                    };

                    const responseData = await fetchWithRetry(gscEndpoint, {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${gscAccessToken}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(gscBody)
                    });

                    if (responseData && responseData.rows) {
                        const parsedRows = responseData.rows.map(row => ({
                            query: row.keys[0],
                            clicks: row.clicks || 0,
                            impressions: row.impressions || 0,
                            ctr: Math.round((row.ctr || 0) * 100),
                            position: Math.round(row.position || 0)
                        }));
                        setMetricsData(parsedRows);
                        showNotification("Данные консоли успешно импортированы");
                    } else {
                        showNotification("Сервер вернул пустой результат");
                    }
                } catch (err) {
                    showNotification("Ошибка запроса проверьте параметры");
                } finally {
                    setIsLoadingMetrics(false);
                }
            };

            // ------------------------------------------
            // SAFE MODULE VARIABLES & LOGIC
            // ------------------------------------------
            const [isAddSafeOpen, setIsAddSafeOpen] = useState(false);
            const [safeService, setSafeService] = useState("");
            const [safeLogin, setSafeLogin] = useState("");
            const [safePass, setSafePass] = useState("");
            const [safeNote, setSafeNote] = useState("");
            const [revealedPasswords, setRevealedPasswords] = useState({});

            const handleCreateSafeItem = (e) => {
                e.preventDefault();
                const serviceTrimmed = safeService.trim();
                if (!serviceTrimmed) return;
                const newItem = {
                    id: "safe_" + Date.now(),
                    service: serviceTrimmed,
                    login: safeLogin.trim(),
                    password: safePass,
                    note: safeNote.trim()
                };
                updateSafe([...safe, newItem]);
                setSafeService("");
                setSafeLogin("");
                setSafePass("");
                setSafeNote("");
                setIsAddSafeOpen(false);
                showNotification("Данные доступа надежно заблокированы");
            };

            const togglePasswordReveal = (itemId) => {
                setRevealedPasswords(prev => ({ ...prev, [itemId]: !prev[itemId] }));
            };

            const handleCopyToClipboard = (text) => {
                const dummyTextarea = document.createElement("textarea");
                dummyTextarea.value = text;
                document.body.appendChild(dummyTextarea);
                dummyTextarea.select();
                document.execCommand("copy");
                document.body.removeChild(dummyTextarea);
                showNotification("Пароль успешно скопирован");
            };

            const handleDeleteSafeItem = (itemId) => {
                const updated = safe.filter(item => item.id !== itemId);
                updateSafe(updated);
                showNotification("Запись удалена из сейфа");
            };

            // Main rendering logic
            if (!isAuthenticated) {
                return (
                    <div class="min-h-screen flex items-center justify-center p-4 relative z-10">
                        <div class="w-full max-w-md bg-black/80 backdrop-blur-md p-8 border border-purple-900/40 rounded-3xl gothic-glow flex flex-col items-center">
                            
                            {/* Stylized Gothic Emblem */}
                            <div class="w-20 h-20 mb-6 bg-purple-950/40 border border-purple-500/30 rounded-full flex items-center justify-center text-3xl font-bold text-purple-400 select-none shadow-[0_0_20px_rgba(168,85,247,0.3)] gothic-header">
                                P
                            </div>

                            <h1 class="text-3xl font-black text-center tracking-widest text-white uppercase gothic-header mb-2">
                                PROMT Support
                            </h1>
                            <p class="text-xs text-purple-400/60 uppercase tracking-widest mb-8 text-center">
                                Закрытое пространство операторов
                            </p>

                            <form onSubmit={handleLogin} class="w-full space-y-6">
                                <div>
                                    <label class="block text-xs uppercase tracking-widest text-purple-300/80 mb-2">
                                        Имя оператора
                                    </label>
                                    <input 
                                        type="text" 
                                        value={loginInput}
                                        onChange={(e) => setLoginInput(e.target.value)}
                                        required
                                        class="w-full bg-zinc-950 border border-zinc-800 focus:border-purple-500 text-white rounded-xl py-3 px-4 outline-none transition-all text-sm tracking-wider font-light"
                                    />
                                </div>

                                <div>
                                    <label class="block text-xs uppercase tracking-widest text-purple-300/80 mb-2">
                                        Пароль доступа
                                    </label>
                                    <input 
                                        type="password" 
                                        value={passwordInput}
                                        onChange={(e) => setPasswordInput(e.target.value)}
                                        required
                                        class="w-full bg-zinc-950 border border-zinc-800 focus:border-purple-500 text-white rounded-xl py-3 px-4 outline-none transition-all text-sm tracking-wider"
                                    />
                                </div>

                                {authError && (
                                    <div class="p-3 bg-red-950/40 border border-red-900/50 text-red-400 text-xs rounded-xl tracking-wider text-center">
                                        {authError}
                                    </div>
                                )}

                                <button 
                                    type="submit"

                                <form onSubmit={handleCreateTask} class="space-y-4">
                                    <div>
                                        <label class="block text-[10px] uppercase tracking-widest text-purple-300/80 mb-1.5">
                                            Название задачи
                                        </label>
                                        <input 
                                            type="text" 
                                            value={taskTitle}
                                            onChange={(e) => setTaskTitle(e.target.value)}
                                            required
                                            class="w-full bg-black border border-zinc-800 focus:border-purple-500 text-white rounded-xl py-2 px-4 outline-none transition-all text-xs tracking-wider"
                                        />
                                    </div>

                                    <div>
                                        <label class="block text-[10px] uppercase tracking-widest text-purple-300/80 mb-1.5">
                                            Описание задачи
                                        </label>
                                        <textarea 
                                            value={taskDesc}
                                            onChange={(e) => setTaskDesc(e.target.value)}
                                            class="w-full bg-black border border-zinc-800 focus:border-purple-500 text-white rounded-xl py-2 px-4 outline-none transition-all text-xs tracking-wider h-20 resize-none"
                                        ></textarea>
                                    </div>

                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-[10px] uppercase tracking-widest text-purple-300/80 mb-1.5">
                                                Исполнитель
                                            </label>
                                            <select 
                                                value={taskAssignee}
                                                onChange={(e) => setTaskAssignee(e.target.value)}
                                                class="w-full bg-black border border-zinc-800 focus:border-purple-500 text-white rounded-xl py-2 px-3 outline-none transition-all text-xs tracking-wider uppercase font-bold"
                                            >
                                                <option value="asya">asya</option>
                                                <option value="sasha">sasha</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label class="block text-[10px] uppercase tracking-widest text-purple-300/80 mb-1.5">
                                                Срок
                                            </label>
                                            <input 
                                                type="text" 
                                                placeholder="23 мая"
                                                value={taskDeadline}
                                                onChange={(e) => setTaskDeadline(e.target.value)}
                                                class="w-full bg-black border border-zinc-800 focus:border-purple-500 text-white rounded-xl py-2 px-4 outline-none transition-all text-xs tracking-wider"
                                            />
                                        </div>
                                    </div>

                                    <div class="flex items-center justify-end gap-3 pt-3 border-t border-zinc-900">
                                        <button 
                                            type="button" 
                                            onClick={() => {
                                                setIsAddTaskOpen(false);
                                                setTaskTitle("");
                                                setTaskDesc("");
                                            }}
                                            class="py-2 px-4 bg-zinc-900 border border-zinc-800 hover:border-zinc-700 rounded-xl text-[10px] uppercase tracking-widest font-bold text-gray-400 hover:text-white transition-all"
                                        >
                                            Отмена
                                        </button>
                                        <button 
                                            type="submit" 
                                            class="py-2 px-4 bg-purple-950/40 border border-purple-500/50 hover:border-purple-400 rounded-xl text-[10px] uppercase tracking-widest font-bold text-purple-300 transition-all"
                                        >
                                            Добавить
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Add Calendar Event Dialog */}
                    {isAddEventOpen && (
                        <div class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div class="bg-zinc-950 border border-purple-500/30 p-6 rounded-3xl w-full max-w-sm gothic-glow space-y-5">
                                <span class="text-xs font-black tracking-widest text-purple-400 uppercase block pb-2 border-b border-zinc-900">
                                    Новое событие
                                </span>
                                <form onSubmit={handleCreateEvent} class="space-y-4">
                                    <div>
                                        <label class="block text-[10px] uppercase tracking-widest text-purple-300/80 mb-1.5">
                                            Название события
                                        </label>
                                        <input 
                                            type="text" 
                                            value={eventTitle}
                                            onChange={(e) => setEventTitle(e.target.value)}
                                            required
                                            class="w-full bg-black border border-zinc-800 focus:border-purple-500 text-white rounded-xl py-2 px-4 outline-none transition-all text-xs tracking-wider"
                                        />
                                    </div>

                                    <div>
                                        <label class="block text-[10px] uppercase tracking-widest text-purple-300/80 mb-1.5">
                                            Время
                                        </label>
                                        <input 
                                            type="text" 
                                            placeholder="14 00"
                                            value={eventTime}
                                            onChange={(e) => setEventTime(e.target.value)}
                                            class="w-full bg-black border border-zinc-800 focus:border-purple-500 text-white rounded-xl py-2 px-4 outline-none transition-all text-xs tracking-wider"
                                        />
                                    </div>

                                    <div class="flex items-center justify-end gap-3 pt-3 border-t border-zinc-900">
                                        <button 
                                            type="button" 
                                            onClick={() => {
                                                setIsAddEventOpen(false);
                                                setEventTitle("");
                                                setEventTime("");
                                            }}
                                            class="py-2 px-4 bg-zinc-900 border border-zinc-800 hover:border-zinc-700 rounded-xl text-[10px] uppercase tracking-widest font-bold text-gray-400 hover:text-white transition-all"
                                        >
                                            Отмена
                                        </button>
                                        <button 
                                            type="submit" 
                                            class="py-2 px-4 bg-purple-950/40 border border-purple-500/50 hover:border-purple-400 rounded-xl text-[10px] uppercase tracking-widest font-bold text-purple-300 transition-all"
                                        >
                                            Добавить
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Add Safe Item Dialog */}
                    {isAddSafeOpen && (
                        <div class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div class="bg-zinc-950 border border-purple-500/30 p-6 rounded-3xl w-full max-w-sm gothic-glow space-y-4">
                                <span class="text-xs font-black tracking-widest text-purple-400 uppercase block pb-2 border-b border-zinc-900">
                                    Добавить запись
                                </span>
                                <form onSubmit={handleCreateSafeItem} class="space-y-3">
                                    <div>
                                        <label class="block text-[10px] uppercase tracking-widest text-purple-300/80 mb-1">
                                            Название сервиса
                                        </label>
                                        <input 
                                            type="text" 
                                            value={safeService}
                                            onChange={(e) => setSafeService(e.target.value)}
                                            required
                                            class="w-full bg-black border border-zinc-800 focus:border-purple-500 text-white rounded-xl py-2 px-4 outline-none transition-all text-xs tracking-wider"
                                        />
                                    </div>

                                    <div>
                                        <label class="block text-[10px] uppercase tracking-widest text-purple-300/80 mb-1">
                                            Логин
                                        </label>
                                        <input 
                                            type="text" 
                                            value={safeLogin}
                                            onChange={(e) => setSafeLogin(e.target.value)}
                                            required
                                            class="w-full bg-black border border-zinc-800 focus:border-purple-500 text-white rounded-xl py-2 px-4 outline-none transition-all text-xs tracking-wider"
                                        />
                                    </div>

                                    <div>
                                        <label class="block text-[10px] uppercase tracking-widest text-purple-300/80 mb-1">
                                            Пароль
                                        </label>
                                        <input 
                                            type="text" 
                                            value={safePass}
                                            onChange={(e) => setSafePass(e.target.value)}
                                            required
                                            class="w-full bg-black border border-zinc-800 focus:border-purple-500 text-white rounded-xl py-2 px-4 outline-none transition-all text-xs tracking-wider"
                                        />
                                    </div>

                                    <div>
                                        <label class="block text-[10px] uppercase tracking-widest text-purple-300/80 mb-1">
                                            Примечание
                                        </label>
                                        <input 
                                            type="text" 
                                            value={safeNote}
                                            onChange={(e) => setSafeNote(e.target.value)}
                                            class="w-full bg-black border border-zinc-800 focus:border-purple-500 text-white rounded-xl py-2 px-4 outline-none transition-all text-xs tracking-wider"
                                        />
                                    </div>

                                    <div class="flex items-center justify-end gap-3 pt-3 border-t border-zinc-900">
                                        <button 
                                            type="button" 
                                            onClick={() => {
                                                setIsAddSafeOpen(false);
                                                setSafeService("");
                                                setSafeLogin("");
                                                setSafePass("");
                                                setSafeNote("");
                                            }}
                                            class="py-2 px-4 bg-zinc-900 border border-zinc-800 hover:border-zinc-700 rounded-xl text-[10px] uppercase tracking-widest font-bold text-gray-400 hover:text-white transition-all"
                                        >
                                            Отмена
                                        </button>
                                        <button 
                                            type="submit" 
                                            class="py-2 px-4 bg-purple-950/40 border border-purple-500/50 hover:border-purple-400 rounded-xl text-[10px] uppercase tracking-widest font-bold text-purple-300 transition-all"
                                        >
                                            Добавить
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
